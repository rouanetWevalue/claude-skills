name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate skill structure

    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md exists in each skill directory
        run: |
          ERRORS=0
          while IFS= read -r skill_md; do
            skill_dir=$(dirname "$skill_md")
            skill_name=$(basename "$skill_dir")
            echo "✅ $skill_md"
          done < <(find skills/ -name "SKILL.md" 2>/dev/null)
          count=$(find skills/ -name "SKILL.md" 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "❌ Aucun skill trouve dans skills/"
            exit 1
          fi
          echo "$count skill(s) valide(s)."

      - name: Check references files are under 150 lines
        run: |
          ERRORS=0
          while IFS= read -r -d '' file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 150 ]; then
              echo "❌ Fichier trop long ($lines lignes) : $file"
              ERRORS=$((ERRORS + 1))
            else
              echo "✅ $file ($lines lignes)"
            fi
          done < <(find skills/ -path "*/references/*.md" -print0 2>/dev/null)
          [ $ERRORS -eq 0 ] || exit 1

      - name: Generate skills index
        run: |
          echo "## Skills index — $(date '+%Y-%m-%d')"
          while IFS= read -r skill_md; do
            skill_dir=$(dirname "$skill_md")
            skill_name=$(basename "$skill_dir")
            category=$(basename "$(dirname "$skill_dir")")
            refs=$(find "$skill_dir/references" -name "*.md" 2>/dev/null | wc -l)
            echo "- **$category/$skill_name** — $refs fichier(s) references/"
          done < <(find skills/ -name "SKILL.md" | sort)
